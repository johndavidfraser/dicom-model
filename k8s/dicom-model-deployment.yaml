apiVersion: apps/v1
kind: Deployment
metadata:
  name: dicom-model
  labels:
    app: dicom-model
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dicom-model
  template:
    metadata:
      labels:
        app: dicom-model
    spec:
      containers:
        - name: dicom-model
          image: dicom-model:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2